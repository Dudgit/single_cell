gears_kwargs:
  adamson: # Single cell perturbation
    hidden_size: 64
    epochs: 20
    perturb_key: "condition"
    ctrl_key: "ctrl"
  dixit: # Single cell + classification
    hidden_size: 64
    epochs: 20
    perturb_key: "condition"
    ctrl_key: "ctrl"
  norman: # multi-perturbation
    hidden_size: 64
    epochs: 20  

PerturbNet_kwargs:
  adamson: # Single cell perturbation
    #? TODO: use real hyperparameters from literature
    train_batch_size: 128
    val_batch_size: 128
    test_batch_size: 128
  dixit: # Single cell + classification
    #? TODO: use real hyperparameters from literature
